version: 2

updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: monthly
    target-branch: main
    commit-message:
      prefix: 'chore(deps): '
    groups:
      uv-minor:
        update-types:
          - minor
          - patch
      uv-major:
        update-types:
          - major
    labels:
      - uv
      - dependencies
      - dependabot

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    target-branch: main
    commit-message:
      prefix: 'chore(deps): '
    groups:
      actions-minor:
        update-types:
          - minor
          - patch
      actions-major:
        update-types:
          - major
    labels:
      - github-actions
      - dependencies
      - dependabot
