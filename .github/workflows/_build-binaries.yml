# Build binaries gate: build PyInstaller binaries for each platform.

name: Build binaries

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-binaries:
    name: Build binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            pyinstaller-name: imap-cleanup-linux-x86_64
            binary-name: imap-cleanup-linux-x86_64
            artifact-name: imap-cleanup-Linux-x86_64
          - os: macos-latest
            pyinstaller-name: imap-cleanup-macos-arm64
            binary-name: imap-cleanup-macos-arm64
            artifact-name: imap-cleanup-macOS-arm64
          - os: windows-latest
            pyinstaller-name: imap-cleanup-windows-x86_64
            binary-name: imap-cleanup-windows-x86_64.exe
            artifact-name: imap-cleanup-Windows-x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Install uv
        uses: astral-sh/setup-uv@main
        with:
          enable-cache: true

      - name: Set up Python from .python-version
        shell: bash
        run: uv python install "$(cat .python-version)"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Generate Windows version info
        if: runner.os == 'Windows'
        run: uv run python scripts/generate_version_info.py --output build/windows_version_info.txt

      - name: Build binary
        if: runner.os != 'Windows'
        run: >-
          uv run --with pyinstaller pyinstaller
          --onefile
          --name ${{ matrix.pyinstaller-name }}
          src/imap_cleanup/__main__.py

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >-
          uv run --with pyinstaller pyinstaller
          --onefile
          --name ${{ matrix.pyinstaller-name }}
          --version-file build/windows_version_info.txt
          --icon assets/imap-cleanup.ico
          src/imap_cleanup/__main__.py

      - name: Upload binary artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.binary-name }}

  build-checksums:
    name: Build SHA-256 checksums
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@main
        with:
          pattern: imap-cleanup-*
          path: release-binaries

      - name: Generate SHA256SUMS.txt
        shell: bash
        run: |
          python3 - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          binaries = sorted(
              (
                  path
                  for path in Path("release-binaries").rglob("*")
                  if path.is_file()
              ),
              key=lambda path: path.name,
          )

          checksums = []
          for binary in binaries:
              digest = sha256()
              with binary.open("rb") as stream:
                  for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                      digest.update(chunk)
              checksums.append(f"{digest.hexdigest()}  {binary.name}\n")

          Path("SHA256SUMS.txt").write_text("".join(checksums), encoding="ascii")
          PY

      - name: Upload checksum artifact
        uses: actions/upload-artifact@main
        with:
          name: SHA256SUMS.txt
          path: SHA256SUMS.txt
